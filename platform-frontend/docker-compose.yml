services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: appsecret
      POSTGRES_DB: marketplace
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d marketplace"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ..
      dockerfile: platform-frontend/Dockerfile
      target: ${FRONTEND_BUILD_TARGET:-dev}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://app:appsecret@db:5432/marketplace"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
