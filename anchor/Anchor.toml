[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "wallet/deployment_wallet"

[scripts]
test = "yarn vitest run tests/marketplace-gas-metaplex.test.ts tests/game-registry.test.ts"

[test.validator]
url = "https://api.mainnet-beta.solana.com"
# Clone Metaplex Token Metadata so list_nft / buy_nft / create_metadata etc. work.
# When using --skip-local-validator, start the validator yourself first. Use
# --clone-upgradeable-program (not --clone) so the program executable is copied:
#   solana-test-validator --clone-upgradeable-program metaqbxxUerdq28cj1RbAWkYQm3ybzjb6a8bt518x1s --url https://api.mainnet-beta.solana.com --reset
[[test.validator.clone]]
address = "metaqbxxUerdq28cj1RbAWkYQm3ybzjb6a8bt518x1s"
